project:
  title: "你的论文题目"

engines:
  generation:
    # 默认采用单主模型生成。
    # 论文是长文本一致性任务，默认不做多引擎融合，避免风格漂移和重复内容。
    mode: "single"
    # chapter：一章一次生成，质量和上下文一致性更好；subsection：一小节一次生成，token 更省。
    granularity: "chapter"
    default: "writer"
    providers:
      writer:
        # 可以直接在这里配置 OpenAI 兼容接口；留空时仍会回退读取下面的环境变量。
        api_base: "https://api.openai.com/v1"
        api_key: ""
        model: "gpt-4o-mini"
        api_base_env: "OPENAI_BASE_URL"
        api_key_env: "OPENAI_API_KEY"
        model_env: "OPENAI_MODEL"
        role: "draft thesis sections"
        weight: 1.0
    batch:
      # 0 表示 generate --all 会连续串行生成所有未完成写作单元；可用 workflow.py pause 暂停在下一个写作单元前。
      max_sections_per_run: 0
      sleep_seconds: 3
      request_timeout_seconds: 600
      max_context_tail_chars: 20000
  quality_gate:
    rule_based: true
    run_after_assemble: true
    fail_on_error: false
    llm_review_on_failure: false
    report: output/quality_gate_report.md
    max_findings_per_rule: 20
    checks:
      hardcoded_refs: true
      placeholders: true
      heading_levels: true
      equation_numbering: false

paths:
  thesis_dir: thesis
  sections_dir: thesis/sections
  output_dir: output
  template_docx: template/reference.docx
  user_data_dir: user_data

assembly:
  output_markdown: output/thesis.md
  target_word_count: 25000
  min_word_count: 25000
  # auto 表示从 thesis/section_plan.json 读取章节顺序。
  # section_plan.json 由 thesis/outline.md 自动生成。
  section_order: auto
  plan_file: thesis/section_plan.json

references:
  output_bibtex: user_data/references.bib
  output_markdown: thesis/references.md
  auto_query: true
  cn_count: 10
  en_count: 10
  max_items: 12
  source_policy: "google_scholar_or_cnki_queryable"

export_docx:
  input_markdown: output/thesis.md
  output_docx: output/thesis.docx
  fallback_docx: output/thesis_latest.docx
  toc_depth: 3
  # 先关闭 Markdown 自动锚点链接，避免 Word 中引用跳转全部落到文档首行。
  enable_cross_reference_links: false

ppt:
  image_slide:
    # Optional image-generation endpoint for --render-mode image_slide.
    # If left empty, the PPT workflow reuses the writer API settings.
    api_base: ""
    api_key: ""
    model: "gpt-image-1"
    size: "1536x1024"
    timeout_seconds: 600
  visual_skill:
    # Enable this to let the PPT workflow call an external visual skill for
    # each slide. The command receives JSON on stdin and returns JSON on stdout.
    enabled: true
    # Leave command empty to use workflows/ppt/visual_skill_runner.py with the
    # current Python interpreter and the existing writer API configuration.
    # Example explicit command:
    # command: ".venv/bin/python workflows/ppt/visual_skill_runner.py"
    # Optional: override api_base/api_key/model here; otherwise it reuses
    # engines.generation.providers.writer and its environment variables.
    command: ""
    timeout_seconds: 180

review:
  input_markdown: output/thesis.md
  prompt: workflows/review/review_prompt.md
  output_report: output/review_results.md
  max_chars_per_request: 30000
  sleep_seconds: 2
  request_timeout_seconds: 600
  apply_revision: true
  mode: "multi_dimension"
  aggregation: "weighted_score"
  threshold:
    pass_score: 0.85
    needs_revision_score: 0.70
  dimensions:
    structure:
      weight: 0.20
      prompt: "检查章节层级、完整性和逻辑连贯性。"
    formatting:
      weight: 0.20
      prompt: "检查 DOCX/Markdown 格式约束和模板符合度。"
    cross_reference:
      weight: 0.20
      prompt: "检查公式、图、表和文献交叉引用。"
    academic_style:
      weight: 0.20
      prompt: "检查学术表达、重复表述、AI 痕迹和上下文一致性。"
    evidence_and_data:
      weight: 0.20
      prompt: "检查论断是否由参数、数据、图片或参考文献支撑。"
