project:
  title: "你的论文题目"

engines:
  generation:
    granularity: "chapter"
    providers:
      writer:
        api_base: "https://api.openai.com/v1"
        api_key: "你的 API Key"
        model: "gpt-4o-mini"
    batch:
      max_sections_per_run: 0
      sleep_seconds: 3
      request_timeout_seconds: 300
      max_context_tail_chars: 8000

assembly:
  min_word_count: 25000
