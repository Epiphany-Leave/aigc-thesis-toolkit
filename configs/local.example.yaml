project:
  title: "你的论文题目"

engines:
  generation:
    granularity: "chapter"
    providers:
      writer:
        api_base: "https://api.openai.com/v1"
        api_key: "你的 API Key"
        model: "gpt-4o-mini"
    batch:
      max_sections_per_run: 0
      sleep_seconds: 3
      request_timeout_seconds: 300
      max_context_tail_chars: 8000

assembly:
  target_word_count: 25000
  min_word_count: 25000

references:
  cn_count: 10
  en_count: 10
  max_items: 20
  source_policy: "google_scholar_or_cnki_queryable"

ppt:
  image_slide:
    api_base: "https://api.openai.com/v1"
    api_key: "你的图像 API Key"
    model: "gpt-image-1"
    size: "1536x1024"
